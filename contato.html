<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contato - Pizzaria da Nonna</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    main {
      text-align: center;
      margin: 80px auto;
      width: 80%;
      color: #fffaf2;
      font-family: 'Playfair Display', serif;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 45px;
      color: #ffcc66;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      margin-bottom: 30px;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 60%;
      margin: 0 auto;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-family: 'Playfair Display', serif;
    }

    button {
      background-color: #ffcc66;
      color: #5b0a0a;
      font-weight: bold;
      border: none;
      padding: 10px 25px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #ffdb85;
      transform: scale(1.05);
    }
  </style>
</head>

<body class="body">
  <div id="menuDropdown" class="dropdown">
    <a href="index.html">Início</a><br>
    <a href="cardapio.html">Cardápio</a><br>
    <a href="contato.html">Contato</a><br>
    <a href="privacidade.html">Privacidade</a>
  </div>

  <main>
    <h1>Fale Conosco 🍕</h1>

    <p>
      Tem alguma dúvida, sugestão ou elogio?<br>
      Envie sua mensagem para a <strong>Pizzaria da Nonna</strong>!
    </p>

    <form action="#" method="post">
      <input type="text" name="nome" placeholder="Seu nome" required>

      <input type="email" name="email" placeholder="Seu e-mail" required>

      <textarea name="mensagem" rows="5" placeholder="Escreva sua mensagem..." required></textarea>

      <button type="submit">Enviar</button>
    </form>
  </main>

  <footer>
    <p class="rodape">© 2025 Pizzaria da Nonna. Todos os direitos reservados.</p>
  </footer>
</body>
</html>
